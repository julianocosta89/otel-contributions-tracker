name: Refresh contributor affiliations

on:
  schedule:
    - cron: '0 7 * * 1'   # 07:00 UTC every Monday
  workflow_dispatch:        # manual trigger from Actions UI

permissions:
  contents: write

concurrency:
  group: otel-data-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # re-fetching stale nulls from GitHub API can take ~10 min

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Fetch affiliations from CNCF gitdm
        run: node scripts/fetch-affiliations.mjs

      - name: Fetch company from GitHub profiles (contributors not in gitdm)
        run: node scripts/fetch-github-companies.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated affiliations
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/affiliations.json data/github-companies.json
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit"
          else
            git commit -m "data: refresh affiliations $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
