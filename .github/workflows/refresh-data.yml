name: Refresh contribution data

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC every day
  workflow_dispatch:        # manual trigger from Actions UI

permissions:
  contents: write

concurrency:
  group: otel-data-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # attribution enrichment makes extra sub-period API calls; 60 min matches refresh-affiliations

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Fetch OpenTelemetry contributions from LF Insights
        # fetch-data.mjs reads data/affiliations.json at startup for attribution enrichment.
        # affiliations.json is committed and checked out above — no need to regenerate it here.
        # Note: on Mondays this runs at 06:00 UTC before refresh-affiliations.yml fires at 07:00,
        # so Monday's cache uses the previous week's affiliations (Tuesday onward picks up the fresh ones).
        run: node scripts/fetch-data.mjs

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit"
          else
            git commit -m "data: refresh contributions $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
