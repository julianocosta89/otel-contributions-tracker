name: Refresh contributor roles

on:
  schedule:
    - cron: '15 6 * * 1'  # 06:15 UTC every Monday (offset from refresh-data at 06:00)
  workflow_dispatch:        # manual trigger from Actions UI

permissions:
  contents: write

concurrency:
  group: otel-data-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Fetch role data from GitHub org teams
        run: node scripts/fetch-roles.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_READ_TOKEN }}

      - name: Commit updated roles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/roles.json
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit"
          else
            git commit -m "data: refresh contributor roles $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
