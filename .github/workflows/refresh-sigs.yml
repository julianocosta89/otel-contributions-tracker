name: Refresh SIG data

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC every day (after refresh-data at 06:00)
  workflow_dispatch:        # manual trigger from Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # fetches per-repo data for many repos across 7 periods

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Fetch per-SIG contributor and organization data from LF Insights
        run: node scripts/fetch-sigs.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SIG cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sigs.json
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit"
          else
            git commit -m "data: refresh SIG data $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
