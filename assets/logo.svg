<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OTel Contributions Tracker logo concept</title>
  <desc id="desc">A central telemetry hexagon connected to surrounding contributor nodes with a pulse line inside.</desc>

  <defs>
    <linearGradient id="otelGradient" x1="112" y1="80" x2="400" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="0.55" stop-color="#425CC7"/>
      <stop offset="1" stop-color="#00B8D9"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172033" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background-safe transparent logo -->

  <!-- Contribution graph connections -->
  <g stroke="#425CC7" stroke-width="10" stroke-linecap="round" opacity="0.34">
    <line x1="256" y1="256" x2="256" y2="84"/>
    <line x1="256" y1="256" x2="398" y2="158"/>
    <line x1="256" y1="256" x2="398" y2="354"/>
    <line x1="256" y1="256" x2="256" y2="428"/>
    <line x1="256" y1="256" x2="114" y2="354"/>
    <line x1="256" y1="256" x2="114" y2="158"/>
  </g>

  <!-- Outer contributor nodes -->
  <g fill="#FFFFFF" stroke="url(#otelGradient)" stroke-width="12" filter="url(#softShadow)">
    <circle cx="256" cy="84" r="36"/>
    <circle cx="398" cy="158" r="36"/>
    <circle cx="398" cy="354" r="36"/>
    <circle cx="256" cy="428" r="36"/>
    <circle cx="114" cy="354" r="36"/>
    <circle cx="114" cy="158" r="36"/>
  </g>

  <!-- Small inner node dots -->
  <g fill="#00B8D9">
    <circle cx="256" cy="84" r="9"/>
    <circle cx="398" cy="158" r="9"/>
    <circle cx="398" cy="354" r="9"/>
    <circle cx="256" cy="428" r="9"/>
    <circle cx="114" cy="354" r="9"/>
    <circle cx="114" cy="158" r="9"/>
  </g>

  <!-- Central OpenTelemetry-inspired hub -->
  <g filter="url(#softShadow)">
    <polygon
      points="256,158 341,207 341,305 256,354 171,305 171,207"
      fill="url(#otelGradient)"
    />
    <polygon
      points="256,184 319,220 319,292 256,328 193,292 193,220"
      fill="#FFFFFF"
      opacity="0.96"
    />

    <!-- Telemetry pulse -->
    <path
      d="M204 260 H232 L243 238 L264 286 L279 252 H308"
      fill="none"
      stroke="#425CC7"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Tracking/data point -->
    <circle cx="308" cy="252" r="9" fill="#00B8D9"/>
  </g>
</svg>
